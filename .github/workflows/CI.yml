name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-buildenv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Dockerfile changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dockerfile:
              - Dockerfile

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if build environment image exists
        id: image-check
        run: |
          if docker manifest inspect ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.changes.outputs.dockerfile == 'true' || steps.image-check.outputs.exists == 'false' }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push build environment image
        if: ${{ steps.changes.outputs.dockerfile == 'true' || steps.image-check.outputs.exists == 'false' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: buildenv
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-pacmanos:
    needs: build-buildenv
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull build environment image
        run: docker pull ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest

      - name: Build debug ISO
        run: IMAGE=ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest ./buildenv.sh make-dbg

      - name: Upload debug ISO
        uses: actions/upload-artifact@v4
        with:
          name: pacmanos-dbg.iso
          path: out/debug/pacmanos.iso
          if-no-files-found: error

      - name: Build release ISO
        run: IMAGE=ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest ./buildenv.sh make-rel

      - name: Upload release ISO
        uses: actions/upload-artifact@v4
        with:
          name: pacmanos-rel.iso
          path: out/release/pacmanos.iso
          if-no-files-found: error
