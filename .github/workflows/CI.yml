name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force-buildenv:
        description: Force rebuild of the Docker build environment image
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  BUILDENV_IMAGE: ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv

jobs:
  need-build-buildenv:
    runs-on: ubuntu-24.04
    outputs:
      build_needed: ${{ steps.detect-build.outputs.build_needed }}

    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@v4

      - &ghcr-login
        name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Dockerfile changes
        id: dockerfile-check
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dockerfile-changed:
              - Dockerfile

      - name: Check published build environment images
        id: image-check
        run: |
          if docker manifest inspect "${BUILDENV_IMAGE}:latest" >/dev/null 2>&1 \
            && docker manifest inspect "${BUILDENV_IMAGE}:amd64" >/dev/null 2>&1 \
            && docker manifest inspect "${BUILDENV_IMAGE}:arm64" >/dev/null 2>&1; then
            echo "all_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect build environment rebuild need
        id: detect-build
        run: |
          build_needed="${{ inputs.force-buildenv == true || steps.dockerfile-check.outputs['dockerfile-changed'] == 'true' || steps.image-check.outputs.all_exists == 'false' }}"
          echo "build_needed=${build_needed}" >> "$GITHUB_OUTPUT"

  build-buildenv:
    needs: need-build-buildenv
    if: ${{ needs.need-build-buildenv.outputs.build_needed == 'true' }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runs_on: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}

    steps:
      - *checkout
      - *ghcr-login

      - &setup-buildx
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push build environment image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: buildenv
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.BUILDENV_IMAGE }}:${{ matrix.arch }}
          cache-from: type=gha,scope=buildenv-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=buildenv-${{ matrix.arch }}

  assemble-buildenv:
    needs: 
      - need-build-buildenv
      - build-buildenv
    if: ${{ needs.need-build-buildenv.outputs.build_needed == 'true' }}
    runs-on: ubuntu-24.04

    steps:
      - *ghcr-login
      - *setup-buildx

      - name: Publish latest multi-arch build environment manifest
        run: |
          docker buildx imagetools create \
            -t "${BUILDENV_IMAGE}:latest" \
            "${BUILDENV_IMAGE}:amd64" \
            "${BUILDENV_IMAGE}:arm64"

  build-pacmanos:
    needs:
      - need-build-buildenv
      - assemble-buildenv
    if: ${{ needs.need-build-buildenv.result == 'success' && (needs.need-build-buildenv.outputs.build_needed != 'true' || needs.assemble-buildenv.result == 'success') }}
    runs-on: ubuntu-24.04

    steps:
      - *checkout
      - *ghcr-login

      - name: Pull build environment image
        run: docker pull "${BUILDENV_IMAGE}:latest"

      - name: Build debug ISO
        run: IMAGE="${BUILDENV_IMAGE}:latest" ./buildenv.sh make-dbg

      - name: Upload debug ISO
        uses: actions/upload-artifact@v4
        with:
          name: pacmanos-dbg-iso
          path: out/debug/pacmanos.iso
          if-no-files-found: error

      - name: Build release ISO
        run: IMAGE="${BUILDENV_IMAGE}:latest" ./buildenv.sh make-rel

      - name: Upload release ISO
        uses: actions/upload-artifact@v4
        with:
          name: pacmanos-rel-iso
          path: out/release/pacmanos.iso
          if-no-files-found: error

  smoke-pacmanos:
    needs: build-pacmanos
    runs-on: ubuntu-24.04

    steps:
      - *checkout

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86

      - *ghcr-login

      - name: Pull build environment image
        run: docker pull "${BUILDENV_IMAGE}:latest"

      - name: Smoke test build matrix
        run: IMAGE="${BUILDENV_IMAGE}:latest" ./buildenv.sh smoke 10
