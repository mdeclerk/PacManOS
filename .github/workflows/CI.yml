name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force-buildenv:
        description: Force rebuild of the Docker build environment image
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-buildenv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Dockerfile changes
        id: dockerfile-check
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dockerfile-changed:
              - Dockerfile

      - name: Check build environment image
        id: image-check
        run: |
          docker manifest inspect ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest >/dev/null 2>&1 \
            && echo "image-exists=true" >> "$GITHUB_OUTPUT" \
            || echo "image-exists=false" >> "$GITHUB_OUTPUT"

      - name: Detect build environment rebuild need
        id: detect-build
        run: |
          echo "build-needed=${{ inputs.force-buildenv == true || steps.dockerfile-check.outputs.dockerfile-changed == 'true' || steps.image-check.outputs.image-exists == 'false' }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: ${{ steps.detect-build.outputs.build-needed == 'true' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ steps.detect-build.outputs.build-needed == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push build environment image
        if: ${{ steps.detect-build.outputs.build-needed == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: buildenv
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-pacmanos:
    needs: build-buildenv
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull build environment image
        run: docker pull ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest

      - name: Build debug ISO
        run: IMAGE=ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest ./buildenv.sh make-dbg

      - name: Upload debug ISO
        uses: actions/upload-artifact@v4
        with:
          name: pacmanos-dbg.iso
          path: out/debug/pacmanos.iso
          if-no-files-found: error

      - name: Build release ISO
        run: IMAGE=ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest ./buildenv.sh make-rel

      - name: Upload release ISO
        uses: actions/upload-artifact@v4
        with:
          name: pacmanos-rel.iso
          path: out/release/pacmanos.iso
          if-no-files-found: error

  smoke-pacmanos:
    needs: build-pacmanos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull build environment image
        run: docker pull ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest

      - name: Smoke test build matrix
        run: IMAGE=ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv:latest ./buildenv.sh smoke 10
