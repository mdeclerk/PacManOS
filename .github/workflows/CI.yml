# Builds the cross-compiler toolchain image locally, compiles debug and 
# release ISOs, and smoke-tests dedicated single-game ISOs in QEMU.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-smoke-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build buildenv image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: buildenv
          load: true
          tags: pacmanos-buildenv:ci
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci

      - name: Build debug ISO
        run: IMAGE=pacmanos-buildenv:ci ./buildenv.sh make-dbg

      - name: Upload debug ISO
        uses: actions/upload-artifact@v7
        with:
          name: pacmanos-dbg-iso
          path: out/debug/pacmanos.iso
          if-no-files-found: error

      - name: Build release ISO
        run: IMAGE=pacmanos-buildenv:ci ./buildenv.sh make-rel

      - name: Upload release ISO
        uses: actions/upload-artifact@v7
        with:
          name: pacmanos-rel-iso
          path: out/release/pacmanos.iso
          if-no-files-found: error

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86

      - name: Run smoke tests
        run: IMAGE=pacmanos-buildenv:ci ./buildenv.sh smoke 10

      - name: Stage release assets
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          mkdir -p release-staging
          cp out/debug/pacmanos.iso   release-staging/pacmanos-dbg.iso
          cp out/release/pacmanos.iso release-staging/pacmanos-rel.iso

      - name: Publish rolling "latest" release
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest build
          body: |
            Rolling build from `${{ github.sha }}`.
            Built on ${{ github.event.head_commit.timestamp }}.
          files: |
            release-staging/pacmanos-dbg.iso
            release-staging/pacmanos-rel.iso
          make_latest: 'true'
          prerelease: false
