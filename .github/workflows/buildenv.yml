# Publishes a multi-arch (amd64 + arm64) cross-compiler toolchain image to GHCR
# for local development use (buildenv.sh init pulls it).
name: buildenv

on:
  push:
    branches: [main]
    paths: [Dockerfile]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BUILDENV_IMAGE: ghcr.io/${{ github.repository_owner }}/pacmanos-buildenv

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: buildenv
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.BUILDENV_IMAGE }}:${{ matrix.arch }}
          cache-from: type=gha,scope=buildenv-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=buildenv-${{ matrix.arch }}

  publish:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t "${BUILDENV_IMAGE}:latest" \
            "${BUILDENV_IMAGE}:amd64" \
            "${BUILDENV_IMAGE}:arm64"
